[package]
name = "vate"
version = "0.1.0"
edition = "2021"
repository = "https://github.com/michaelni678/vate"
readme = "../README.md"
license = "Apache-2.0"
keywords = ["validate", "validation", "validator"]
description = "Rust data validation crate"

[dependencies]
regex = { version = "1.11.0", optional = true }
vate-derive = { path = "../vate-derive" }
zxcvbn = { version = "3.1.0", optional = true }

[dev-dependencies]
once_cell = "1.20.1"

[features]
default = []
full = [
    "password",
    "regex",
]
password = ["dep:zxcvbn"]
regex = ["dep:regex"]
